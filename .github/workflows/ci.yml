name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: dev
            build-preset: build-dev
            test-preset: test-dev
          - os: windows-latest
            preset: dev
            build-preset: build-dev
            test-preset: test-dev
          - os: macos-latest
            preset: dev
            build-preset: build-dev
            test-preset: test-dev

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build-preset }}

      - name: Test
        run: ctest --preset ${{ matrix.test-preset }}

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang-format

      - name: Configure
        run: cmake --preset dev

      - name: Check formatting
        run: cmake --build --preset build-dev --target format-check

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [asan]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset build-${{ matrix.preset }}

      - name: Test
        run: ctest --preset test-dev
